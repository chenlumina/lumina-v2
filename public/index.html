<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina-v2</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <div id="auth-page" class="page active">
      <div class="auth-container">
        <h1>Lumina-v2</h1>
        <p class="subtitle">欢迎使用 Lumina-v2</p>
        <div id="auth-tabs" class="tabs">
          <button class="tab active" data-tab="login">登录</button>
          <button class="tab" data-tab="register">注册</button>
        </div>
        <form id="login-form" class="auth-form active">
          <input type="text" id="login-username" placeholder="用户名" required>
          <input type="password" id="login-password" placeholder="密码" required>
          <button type="submit">登录</button>
          <p class="error" id="login-error"></p>
        </form>
        <form id="register-form" class="auth-form">
          <input type="text" id="reg-username" placeholder="用户名 (2-20个字符)" required>
          <input type="password" id="reg-password" placeholder="密码 (至少6位)" required>
          <button type="submit">注册</button>
          <p class="error" id="reg-error"></p>
        </form>
      </div>
    </div>
    <div id="chat-page" class="page">
      <aside id="sidebar">
        <div class="sidebar-header"><h2>对话列表</h2><button id="new-chat-btn">+ 新对话</button></div>
        <ul id="conversation-list"></ul>
        <div class="sidebar-footer">
          <button id="memory-btn">记忆管理</button>
          <button id="logout-btn">退出</button>
        </div>
      </aside>
      <main id="chat-main">
        <div id="chat-header">
          <button id="sidebar-toggle" class="mobile-only">☰</button>
          <h3 id="chat-title">选择或创建一个对话</h3>
          <button id="theme-toggle-btn" class="theme-toggle-btn">🌙 暗色</button>
        </div>
        <div id="messages-container">
          <div id="welcome-screen"><h2>欢迎使用 Lumina-v2</h2><p>选择左侧对话或创建新对话开始聊天</p></div>
          <div id="messages"></div>
        </div>
        <div id="input-area" class="hidden">
          <div class="input-wrapper">
            <textarea id="message-input" placeholder="输入消息... (Enter发送，Shift+Enter换行)" rows="1"></textarea>
            <button id="stop-btn" class="stop-btn" title="停止生成">■</button>
            <button id="model-switch-btn" class="icon-btn" title="切换模型">⚙️</button>
            <button id="send-btn" title="发送">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
        </div>
      </main>
      <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header"><h3>选择模型</h3><button class="close-btn">×</button></div>
          <div class="modal-body"><label>当前模型</label><select id="model-select"></select><p id="settings-status" class="settings-status"></p></div>
          <div class="modal-footer"><button id="save-settings-btn">保存</button></div>
        </div>
      </div>
      <div id="memory-modal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header"><h3>长期记忆管理</h3><button class="close-btn" id="close-memory-btn">×</button></div>
          <div class="modal-body"><textarea id="memory-textarea" placeholder="输入你的长期偏好，AI 将永久记住..."></textarea></div>
          <div class="modal-footer"><button id="clear-memory-btn" style="background: var(--error);">清除记忆</button><button id="save-memory-btn">保存记忆</button></div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
